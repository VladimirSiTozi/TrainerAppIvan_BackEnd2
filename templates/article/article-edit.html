{% extends 'common/base.html' %}

{% block content %}
    <div class="table-container">
        <h2>Edit Article</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>
        <hr>
        <form method="post" action="{% url 'article-delete' article.pk %}" onsubmit="return confirmDelete();">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ Delete Product</button>
        </form>

        <script>
            function confirmDelete() {
                return confirm("Do you really want to delete this article?");
            }
        </script>
    </div>
{% endblock %}
