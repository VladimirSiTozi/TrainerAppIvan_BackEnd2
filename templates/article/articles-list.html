{% extends 'common/base.html' %}

{% block content %}
    <div class="admin-container">
        <h2>Articles List</h2>

        {% if articles %}
            <ol class="active-green">
                {% for article in articles %}
                    <li>
                        <a href="{% url 'article-detail' pk=article.pk %}">{{ article.name }}</a><br>
                    </li>
                {% endfor %}
            </ol>
            
        {% else %}
            <p>No articles existing.</p>
        {% endif %}
    </div>
{% endblock %}
