{% extends 'common/base.html' %}

{% block content %}
    <div class="contact-form">
        <h2>Contact Us</h2>

        {% if success %}
            <p class="success-message" style="color: green;">{{ success }}</p>
        {% endif %}
        {% if error %}
            <p class="error-message" style="color: red;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="name-fields">
                <div class="form-group">
                    <label for="first-name">First Name*</label>
                    <input type="text" id="first-name" name="first-name" required value="{{ request.POST.first_name|default:'' }}">
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name*</label>
                    <input type="text" id="last-name" name="last-name" required value="{{ request.POST.last_name|default:'' }}">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email*</label>
                <input type="email" id="email" name="email" required value="{{ request.POST.email|default:'' }}">
            </div>

            <div class="form-group">
                <label for="theme">Theme*</label>
                <select id="theme" name="theme">
                    <option value="" disabled selected hidden></option>
                    <option value="general" {% if request.POST.theme == "general" %}selected{% endif %}>General Inquiry</option>
                    <option value="support" {% if request.POST.theme == "support" %}selected{% endif %}>Support</option>
                    <option value="feedback" {% if request.POST.theme == "feedback" %}selected{% endif %}>Feedback</option>
                    <option value="business" {% if request.POST.theme == "business" %}selected{% endif %}>Business Inquiry</option>
                    <option value="other" {% if request.POST.theme == "other" %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message*</label>
                <textarea id="message" name="message" required>{{ request.POST.message|default:'' }}</textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>
{% endblock %}
