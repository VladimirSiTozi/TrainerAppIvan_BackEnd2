<div class="home-card">
    <img src="{{ product.image.url }}" alt="Product Image" class="card-image">
    <div><h3>{{ product.name }}</h3></div>
    <div class="home-card-text">
        <p>{{ product.brief_description|truncatechars:100 }}</p>
    </div>
    <a href="{% url 'product-detail' product.pk %}" class="card-button">See More</a>
</div>
