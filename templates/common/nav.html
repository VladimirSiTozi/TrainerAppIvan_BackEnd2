{% load static %}

<div class="container logo-container">
    <img src="{% static 'assets/images/png/ivan_the_logo.png' %}" alt="Logo" class="logo">
</div>
<div class="container navigation-container">
    <!-- Hamburger Icon -->
    <div class="hamburger" onclick="toggleMenu()">
        &#9776;
    </div>

    <div class="navigation-buttons" id="navMenu">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'coaching' %}">coaching</a>
        <a href="{% url 'shop-home' %}">programs</a>
        <a href="{% url 'contact-me' %}">contact</a>
        <a href="{% url 'articles-home' %}">articles</a>
        <a href="{% url 'about-us' %}">about</a>
        <a href="{% url 'cart' %}" class="cart-button">🛒 Cart</a>
        {% if not request.user.is_authenticated %}
            <a href="{% url 'login' %}">login</a>
        {% else %}
            <a href="{% url 'account-detail' request.user.profile.slug %}">profile</a>
            <form id="logout-form" action="{% url 'logout' %}" method="POST" style="display: none;">
                {% csrf_token %}
            </form>

            <button onclick="confirmLogout()" class="btn btn-danger">LOGOUT</button>

            <script>
                function confirmLogout() {
                    if (confirm("Are you sure you want to logout?")) {
                        document.getElementById('logout-form').submit();
                    }
                }
            </script>
        {% endif %}

    </div>
    {{ request.session.user_data.email }}
</div>

<script>
    function toggleMenu() {
        const nav = document.getElementById("navMenu");
        nav.classList.toggle("show");
    }
</script>
