{% load static %}

<div class="container logo-container">
    <img src="{% static 'assets/images/png/ivan_the_logo.png' %}" alt="Logo" class="logo">
</div>
<div class="container navigation-container">
    <div class="navigation-buttons">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'coaching' %}">choacing</a>
        <a href="{% url 'shop-home' %}">programs</a>
        <a href="{% url 'contact-me' %}">contact</a>
        <a href="{% url 'articles-home' %}">articles</a>
        <a href="{% url 'about-us' %}">about</a>
        {% if not request.user.is_authenticated %}
             <a href="{% url 'login' %}">login</a>
        {% else %}
            <a href="{% url 'account-detail' %}">profile</a>
            <a href="{% url 'sign-out' %}">logout</a>
        {% endif %} 
       
    </div>
    {{ request.session.user_data.email }}
</div>
