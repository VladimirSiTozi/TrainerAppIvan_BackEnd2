{% extends 'common/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; padding: 30px; background-color: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; font-family: Arial, sans-serif;">
    <h2 style="color: #333;">📬 Check Your Email</h2>
    <p style="color: #555; font-size: 16px; margin: 20px 0;">
        If an account exists for the provided email, we’ve sent a password reset link.
        Please check your inbox and follow the instructions.
    </p>
    <p style="font-size: 14px; color: #888; margin-top: 30px;">
        Didn’t receive the email? Check your spam or try again.
    </p>
</div>
{% endblock %}
