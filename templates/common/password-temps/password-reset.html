{% extends 'common/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; padding: 30px; background-color: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-family: Arial, sans-serif;">
    <h2 style="color: #333; text-align: center;">🔐 Forgot Your Password?</h2>
    <p style="color: #555; font-size: 16px; text-align: center; margin-bottom: 30px;">
        Enter your email below and we’ll send you a link to reset your password.
    </p>
    <form method="POST" style="display: flex; flex-direction: column; gap: 16px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background-color: #4CAF50; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">
            Send Reset Link
        </button>
    </form>
</div>
{% endblock %}
