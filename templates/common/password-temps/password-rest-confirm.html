{% extends 'common/base.html' %}

{% block content %}
    <div style="max-width: 600px; margin: 50px auto; padding: 30px; background-color: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-family: Arial, sans-serif;">

        <h2 style="color: #333; text-align: center;">🔐 Set a New Password</h2>

        <p style="color: #555; font-size: 16px; text-align: center; margin-bottom: 30px;">
            Please enter your new password below.
        </p>

        <form method="POST" style="display: flex; flex-direction: column; gap: 16px;">
            {% csrf_token %}
            {% for field in form %}
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <div style="color: #000; font-weight: 500;">
                        {{ field.label }}
                    </div>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: red; font-size: 13px;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit"
                    style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">
                Change Password
            </button>
        </form>

        <p style="font-size: 13px; color: #999; margin-top: 20px; text-align: center;">
            Already changed it? <a href="{% url 'login' %}" style="color: #007bff;">Log in</a>
        </p>
    </div>
{% endblock %}
