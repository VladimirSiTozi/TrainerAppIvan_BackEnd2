{% extends 'common/base.html' %}

{% block content %}
<div class="workout-plan-container">

    <form method="post" id="workout-plan-form">
        {% csrf_token %}

        <table class="table">
            <tr>
                <th>Клиент:</th>
                <td>{{ plan_form.user }}</td>
            </tr>
            <tr>
                <th>Име на програмата:</th>
                <td>{{ plan_form.name }}</td>
            </tr>
            <tr>
                <th>Описание:</th>
                <td>{{ plan_form.description }}</td>
            </tr>
        </table>

        <h2>Периоди</h2>
        <table class="table" id="periods-table">
            <tbody id="periods-container">
                <!-- HTMX ще добавя тук <tr> за периоди + дните под тях -->
            </tbody>
        </table>

        <button type="button" class="btn btn-secondary"
                hx-get="{% url 'get_period_form' %}"
                hx-target="#periods-container"
                hx-swap="beforeend">
            + Добави период
        </button>

        <button type="submit" class="btn btn-primary">Запази програмата</button>
    </form>
</div>

<!-- JS & библиотеки -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.6"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<!-- CSRF за HTMX -->
<script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
        evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
</script>

<!-- Инициализиране на Select2 след всяко HTMX добавяне -->
<script>
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.target.closest('table')) {
            $('.select2').select2();
        }
    });
</script>
{% endblock %}
