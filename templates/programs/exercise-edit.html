{% extends 'common/base.html' %}

{% block content %}
    <div class="admin-container">
        <h2>Edit Exercise</h2>
        <h3>{{ exercise.exercise_template.name }} ---> {{ exercise.day }} </h3>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>

        <hr>
        <form method="post" action="{% url 'delete_exercise' exercise.pk %}" onsubmit="return confirmDelete();">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ Delete Exercise</button>
        </form>

        <script>
            function confirmDelete() {
                return confirm("Do you really want to delete this exercise?");
            }
        </script>
    </div>


{% endblock %}
