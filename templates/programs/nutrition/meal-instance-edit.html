{% extends 'common/base.html' %}

{% block content %}
    <div class="table-container">
        <h2>Add Meal Instance</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>

        <hr>
        <form method="post" action="{% url 'delete-meal' meal_instance.pk %}" onsubmit="return confirmDelete();">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ Delete Meal</button>
        </form>

        <script>
            function confirmDelete() {
                return confirm("Do you really want to delete this Meal?");
            }
        </script>
    </div>
{% endblock %}
