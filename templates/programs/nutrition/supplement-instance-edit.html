{% extends 'common/base.html' %}

{% block content %}
    <div class="admin-container">
        <h2>Edit Supplement</h2>
        <h3>{{ supplement.supplement_template.name }} in {{ supplement.nutrition_plan }}</h3>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>
        
        <hr>
        <form method="post" action="{% url 'delete-supplement' supplement.pk %}" onsubmit="return confirmDelete();">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ Delete Supplement</button>
        </form>

        <script>
            function confirmDelete() {
                return confirm("Do you really want to delete this supplement instance?");
            }
        </script>
    </div>
{% endblock %}
