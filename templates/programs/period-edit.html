{% extends 'common/base.html' %}

{% block content %}
    <div class="admin-container">
        <h2>Edit Period</h2>
        <h3>Period {{ period.number }} of {{ period.workout_plan }}</h3>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>
        
        <hr>
        <form method="post" action="{% url 'period-delete' period.pk %}" onsubmit="return confirmDelete();">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ Delete Period</button>
        </form>

        <script>
            function confirmDelete() {
                return confirm("Do you really want to delete this period?");
            }
        </script>
    </div>
{% endblock %}
