{% extends 'account/account-base.html' %}

{% block account-content %}

    <div class="table-container">
        <ul>
            {% for workout_plan in workout_plans %}
                <li>
                    <a href="{% url 'workout_plan_details' slug=request.user.profile.slug pk=workout_plan.pk %}" class="workout-link">{{ workout_plan.name }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
